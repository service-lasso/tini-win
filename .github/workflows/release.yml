name: release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version override (for example 2026.4.9.12)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      GO_VERSION: '1.24.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Resolve version and tag
        id: version
        shell: pwsh
        run: |
          $override = '${{ github.event.inputs.version }}'
          if (-not [string]::IsNullOrWhiteSpace($override)) {
            $version = $override.Trim()
          } else {
            $dateVersion = (Get-Date).ToUniversalTime().ToString('yyyy.M.d')
            $version = "$dateVersion.${{ github.run_number }}"
          }
          $tag = "v$version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package release
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version '${{ steps.version.outputs.value }}' -Platform 'windows-amd64' -OutputDir '.\dist'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tini-win-${{ steps.version.outputs.value }}-windows-amd64
          path: |
            dist\*.zip
            dist\*.sha256

      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f '${{ steps.version.outputs.tag }}' '${{ github.sha }}'
          git push origin 'refs/tags/${{ steps.version.outputs.tag }}' --force

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            dist\*.zip
            dist\*.sha256
          generate_release_notes: true
          make_latest: true
