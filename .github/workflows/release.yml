name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version label (for example v0.1.0)
        required: true
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      GO_VERSION: '1.24.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = '${{ github.ref_name }}'
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package release
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version '${{ steps.version.outputs.value }}' -Platform 'windows-amd64' -OutputDir '.\dist'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tini-win-${{ steps.version.outputs.value }}-windows-amd64
          path: |
            dist\*.zip
            dist\*.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\*.zip
            dist\*.sha256
          generate_release_notes: true
